services:
  db:
    image: postgres:17-alpine
    container_name: himalayan-postgres
    environment:
      POSTGRES_DB: himalayan_450
      POSTGRES_USER: himalayan
      POSTGRES_PASSWORD: himalayan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  lbc:
    build:
      context: .
      dockerfile: lbc.Dockerfile
    container_name: himalayan-lbc
    command: uvicorn src.lbc_service:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: himalayan-ngrok
    depends_on:
      - lbc
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http lbc:8001 --url ${NGROK_DOMAIN}
    profiles:
      - tunnel

volumes:
  pgdata:
