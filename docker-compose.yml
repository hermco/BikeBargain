services:
  db:
    image: postgres:17-alpine
    container_name: himalayan-postgres
    environment:
      POSTGRES_DB: himalayan_450
      POSTGRES_USER: himalayan
      POSTGRES_PASSWORD: himalayan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  lbc:
    build: .
    container_name: himalayan-lbc
    command: uvicorn src.lbc_service:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: himalayan-tunnel
    depends_on:
      - lbc
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel

volumes:
  pgdata:
